name: Deploy to Staging

on:
  push:
    branches:
      - develop
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.specialistly.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      # Get metadata
      - name: Get commit info
        id: commit
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --format=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --format=%an)" >> $GITHUB_OUTPUT
      
      # Build frontend
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
      
      # Build backend (optional for Railway to auto-detect)
      - name: Build backend
        working-directory: ./backend
        run: npm ci
      
      # Deploy to Railway via CLI
      - name: Deploy to Railway (Staging)
        uses: railway-app/cli-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: staging-specialistly
          environment: staging
      
      # Run smoke tests on staging
      - name: Wait for deployment
        run: sleep 30
      
      - name: Run smoke tests
        continue-on-error: true
        run: |
          echo "Running health check..."
          curl -f https://nest.unearthoneearth.com/api/health || echo "Health check endpoint not available"
          echo "✅ Smoke tests complete (check manually if needed)"
      
      # Slack notification (optional)
      - name: Notify deployment
        if: always()
        run: |
          echo "📦 Deployment Summary"
          echo "Environment: Staging"
          echo "Commit: ${{ steps.commit.outputs.sha }}"
          echo "Message: ${{ steps.commit.outputs.message }}"
          echo "Author: ${{ steps.commit.outputs.author }}"
          echo "Status: ${{ job.status }}"
